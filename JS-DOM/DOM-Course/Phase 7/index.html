<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale= 1.0" />
    <title>DOM Course - Phase 4</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <form id="form" class="card">
      <div class="progress">
        <div class="progress-bar"></div>
      </div>
      <div class="step-count"></div>

      <!-- Step 1 -->
      <div data-step>
        <h3>Email</h3>
        <div class="field">
          <input name="email" placeholder="Enter email" />
          <div class="field-hint" data-hint="email"></div>
        </div>
      </div>

      <!-- Step 2 -->
      <div data-step>
        <h3>Password</h3>
        <div class="field">
          <input type="password" name="password" placeholder="Enter password" />
          <div class="field-hint" data-hint="password"></div>
        </div>
      </div>

      <!-- Step 3 -->
      <div data-step>
        <h3>Review</h3>
        <p>Click submit to finish</p>
      </div>

      <div class="actions">
        <button type="button" id="back" class="secondary">Back</button>
        <button type="button" id="next">Next</button>
        <button type="button" id="submit" hidden>Submit</button>
      </div>
    </form>
