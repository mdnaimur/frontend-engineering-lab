<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production Style API Client Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #334155;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    h2 {
      margin-bottom: 16px;
      color: #38bdf8;
    }

    p {
      color: #94a3b8;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .post {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
    }

    .post h3 {
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    .loading {
      background: #1d4ed8;
    }

    .success {
      background: #166534;
    }

    .error {
      background: #991b1b;
    }

    pre {
      background: #020617;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin-top: 20px;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Production Style API Client</h1>
      <p>
        This demo shows a clean frontend architecture using:
      </p>

      <div class="grid">
        <div class="post">
          <h3>API Client Layer</h3>
          <p>Centralized fetch handling with retries and errors.</p>
        </div>

        <div class="post">
          <h3>Service Layer</h3>
          <p>Reusable business API methods.</p>
        </div>

        <div class="post">
          <h3>Dashboard Layer</h3>
          <p>Pure UI orchestration and rendering.</p>
        </div>
      </div>

      <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
        <button id="loadBtn">Load Dashboard</button>
        <button id="createBtn">Create Post</button>
      </div>

      <div id="status"></div>
    </div>

    <div class="card">
      <h2>User Dashboard</h2>
      <div id="dashboard"></div>
    </div>

    <div class="card">
      <h2>Console Logs</h2>
      <pre id="logs"></pre>
    </div>
  </div>

  <script>
    // =====================================================
    // ERROR CLASSES
    // =====================================================

    class HttpError extends Error {
      constructor(status, statusText, body) {
        super(`HTTP ${status}: ${statusText}`);
        this.name = 'HttpError';
        this.status = status;
        this.statusText = statusText;
        this.body = body;
      }
    }

    class NetworkError extends Error {
      constructor(message) {
        super(message);
        this.name = 'NetworkError';
      }
    }

    class TimeoutError extends Error {
      constructor(ms) {
        super(`Request timed out after ${ms}ms`);
        this.name = 'TimeoutError';
      }
    }

    // =====================================================
    // CONFIG
    // =====================================================

    const BASE_URL = 'https://jsonplaceholder.typicode.com';
    const TIMEOUT_MS = 10000;
    const MAX_RETRIES = 3;

    // =====================================================
    // HELPERS
    // =====================================================

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function log(message) {
      console.log(message);

      const logs = document.getElementById('logs');
      logs.textContent += message + '\n';
    }

    function logRequest(method, url) {
      log(`→ ${method} ${url}`);
    }

    function getAuthHeader() {
      const token = localStorage.getItem('authToken');

      return token
        ? { Authorization: `Bearer ${token}` }
        : {};
    }

    function showStatus(message, type = 'loading') {
      const status = document.getElementById('status');

      status.className = `status ${type}`;
      status.textContent = message;
    }

    // =====================================================
    // CORE REQUEST FUNCTION
    // =====================================================

    async function request(endpoint, options = {}) {
      const url = `${BASE_URL}${endpoint}`;

      const controller = new AbortController();

      const timeoutId = setTimeout(() => {
        controller.abort();
      }, TIMEOUT_MS);

      const config = {
        method: options.method || 'GET',

        headers: {
          'Content-Type': 'application/json',
          Accept: 'application/json',
          ...getAuthHeader(),
          ...options.headers
        },

        signal: controller.signal,
        body: options.body
      };

      try {
        logRequest(config.method, url);

        const response = await fetch(url, config);

        clearTimeout(timeoutId);

        if (!response.ok) {
          let errorBody = null;

          try {
            errorBody = await response.json();
          } catch {
            errorBody = await response.text();
          }

          throw new HttpError(
            response.status,
            response.statusText,
            errorBody
          );
        }

        const contentType = response.headers.get('content-type') || '';

        if (!contentType.includes('application/json')) {
          return null;
        }

        return await response.json();
      } catch (err) {
        clearTimeout(timeoutId);

        if (err.name === 'AbortError') {
          throw new TimeoutError(TIMEOUT_MS);
        }

        if (err instanceof HttpError) {
          throw err;
        }

        throw new NetworkError(err.message);
      }
    }

    // =====================================================
    // RETRY LAYER
    // =====================================================

    function isRetryable(err) {
      if (err instanceof TimeoutError) return true;
      if (err instanceof NetworkError) return true;

      if (err instanceof HttpError) {
        return err.status === 429 || err.status >= 500;
      }

      return false;
    }

    async function requestWithRetry(endpoint, options = {}, retries = MAX_RETRIES) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          return await request(endpoint, options);
        } catch (err) {
          const isLast = attempt === retries;
          const retryable = isRetryable(err);

          if (!retryable || isLast) {
            throw err;
          }

          const delay = 200 * Math.pow(2, attempt - 1);

          log(`⚠ Retry ${attempt}/${retries} in ${delay}ms`);

          await sleep(delay);
        }
      }
    }

    // =====================================================
    // API CLIENT
    // =====================================================

    const apiClient = {
      get(endpoint, options = {}) {
        return requestWithRetry(endpoint, {
          ...options,
          method: 'GET'
        });
      },

      post(endpoint, body, options = {}) {
        return requestWithRetry(endpoint, {
          ...options,
          method: 'POST',
          body: JSON.stringify(body)
        });
      },

      put(endpoint, body, options = {}) {
        return requestWithRetry(endpoint, {
          ...options,
          method: 'PUT',
          body: JSON.stringify(body)
        });
      },

      patch(endpoint, body, options = {}) {
        return requestWithRetry(endpoint, {
          ...options,
          method: 'PATCH',
          body: JSON.stringify(body)
        });
      },

      delete(endpoint, options = {}) {
        return requestWithRetry(endpoint, {
          ...options,
          method: 'DELETE'
        });
      }
    };

    // =====================================================
    // USER SERVICE
    // =====================================================

    const userService = {
      getById(id) {
        return apiClient.get(`/users/${id}`);
      },

      getAll() {
        return apiClient.get('/users');
      },

      getPosts(userId) {
        return apiClient.get(`/users/${userId}/posts`);
      }
    };

    // =====================================================
    // POST SERVICE
    // =====================================================

    const postService = {
      getAll() {
        return apiClient.get('/posts');
      },

      create(postData) {
        return apiClient.post('/posts', postData);
      }
    };

    // =====================================================
    // DASHBOARD LOGIC
    // =====================================================

    async function loadDashboard(userId) {
      console.time('dashboard');

      try {
        showStatus('⏳ Loading dashboard...', 'loading');

        const user = await userService.getById(userId);

        const [postsResult, allPostsResult] = await Promise.allSettled([
          userService.getPosts(userId),
          postService.getAll()
        ]);

        const posts = postsResult.status === 'fulfilled'
          ? postsResult.value
          : [];

        const allPosts = allPostsResult.status === 'fulfilled'
          ? allPostsResult.value
          : [];

        renderDashboard({
          user,
          posts,
          allPosts
        });

        showStatus('✓ Dashboard loaded successfully', 'success');

        console.timeEnd('dashboard');

      } catch (err) {
        if (err instanceof TimeoutError) {
          showStatus('❌ Request timeout', 'error');
          return;
        }

        if (err instanceof HttpError) {
          if (err.status === 404) {
            showStatus('❌ User not found', 'error');
            return;
          }

          showStatus(`❌ Server Error: ${err.message}`, 'error');
          return;
        }

        if (err instanceof NetworkError) {
          showStatus('❌ Network error', 'error');
          return;
        }

        console.error(err);
      }
    }

    function renderDashboard({ user, posts, allPosts }) {
      const dashboard = document.getElementById('dashboard');

      dashboard.innerHTML = `
        <div class="grid">
          <div class="post">
            <h3>User Information</h3>
            <p><strong>Name:</strong> ${user.name}</p>
            <p><strong>Email:</strong> ${user.email}</p>
            <p><strong>Company:</strong> ${user.company.name}</p>
          </div>

          <div class="post">
            <h3>Statistics</h3>
            <p><strong>User Posts:</strong> ${posts.length}</p>
            <p><strong>Total Feed Posts:</strong> ${allPosts.length}</p>
          </div>
        </div>

        <div style="margin-top: 30px;">
          <h2>User Posts</h2>
          <div class="grid">
            ${posts.slice(0, 6).map(post => `
              <div class="post">
                <h3>${post.title}</h3>
                <p>${post.body}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // =====================================================
    // CREATE POST DEMO
    // =====================================================

    async function createDemoPost() {
      try {
        showStatus('⏳ Creating post...', 'loading');

        const post = await postService.create({
          title: 'Production API Client Demo',
          body: 'This post was created using the API client abstraction layer.',
          userId: 1
        });

        log(`✓ Created post with ID ${post.id}`);

        showStatus('✓ Post created successfully', 'success');

      } catch (err) {
        showStatus(`❌ ${err.message}`, 'error');
      }
    }

    // =====================================================
    // EVENTS
    // =====================================================

    document.getElementById('loadBtn')
      .addEventListener('click', () => {
        loadDashboard(1);
      });

    document.getElementById('createBtn')
      .addEventListener('click', () => {
        createDemoPost();
      });

    // Auto load
    loadDashboard(1);
  </script>
</body>
</html>
