<!DOCTYPE html>
<html>

<head>
    <title>Smart Notes</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: sans-serif;
            background: #f5f5f0;
            min-height: 100vh
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10
        }

        .topbar h1 {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1
        }

        .btn {
            padding: 7px 14px;
            border-radius: 7px;
            border: 1px solid #d1d1d1;
            background: #fff;
            cursor: pointer;
            font-size: 13px
        }

        .btn:hover {
            background: #f5f5f5
        }

        .btn-primary {
            background: #18181b;
            color: #fff;
            border-color: #18181b
        }

        .btn-primary:hover {
            background: #27272a
        }

        .app {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .controls input {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            border: 1px solid #d1d1d1;
            border-radius: 7px;
            font-size: 14px
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px
        }

        .note-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.3s, transform 0.3s
        }

        .note-card.visible {
            opacity: 1;
            transform: translateY(0)
        }

        .note-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08)
        }

        .note-title {
            font-size: 14px;
            font-weight: 600;
            color: #18181b;
            word-break: break-word
        }

        .note-body {
            font-size: 13px;
            color: #555;
            line-height: 1.55;
            flex: 1;
            word-break: break-word;
            white-space: pre-wrap
        }

        .note-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px
        }

        .note-date {
            font-size: 11px;
            color: #aaa
        }

        .note-actions {
            display: flex;
            gap: 4px
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 5px;
            font-size: 14px;
            color: #888
        }

        .icon-btn:hover {
            background: #f5f5f5;
            color: #333
        }

        .tag {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 12px;
            background: #f0f0f0;
            font-size: 11px;
            color: #555
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            display: none
        }

        .modal-backdrop.open {
            display: flex
        }

        .modal {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .modal h2 {
            font-size: 1rem;
            font-weight: 600
        }

        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d1d1d1;
            border-radius: 7px;
            font-size: 14px;
            font-family: inherit
        }

        .modal textarea {
            height: 120px;
            resize: vertical
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px
        }

        .empty {
            text-align: center;
            color: #aaa;
            padding: 3rem 0;
            font-size: 14px;
            grid-column: 1/-1
        }

        .status-bar {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #18181b;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none
        }

        .status-bar.show {
            opacity: 1
        }

        .offline-banner {
            background: #f59e0b;
            color: #fff;
            text-align: center;
            padding: 6px;
            font-size: 13px;
            display: none
        }

        .offline-banner.show {
            display: block
        }
    </style>
</head>

<body>

    <div class="offline-banner" id="offlineBanner">You are offline — notes save locally</div>

    <div class="topbar">
        <h1>Smart Notes</h1>
        <span id="noteCount" style="font-size:13px;color:#888"></span>
        <button class="btn btn-primary" onclick="openModal()">+ New Note</button>
    </div>

    <div class="app">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search notes..." oninput="render()" />
            <select class="btn" id="tagFilter" onchange="render()">
                <option value="">All tags</option>
            </select>
            <select class="btn" id="sortBy" onchange="render()">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="alpha">A → Z</option>
            </select>
        </div>
        <div class="notes-grid" id="notesGrid"></div>
    </div>

    <!-- New/Edit Modal -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal">
            <h2 id="modalTitle">New Note</h2>
            <input type="text" id="inputTitle" placeholder="Title" maxlength="80" />
            <textarea id="inputBody" placeholder="Write your note..."></textarea>
            <input type="text" id="inputTag" placeholder="Tag (e.g. work, personal, idea)" maxlength="30" />
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveNote()">Save</button>
            </div>
        </div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <script>
        // ── STATE ────────────────────────────────────────────
        const storage = {
            get(key, fallback = null) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : fallback;
                } catch {
                    return fallback;
                }
            },

            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                    return true;
                } catch {
                    return false;
                }
            },

            remove(key) {
                try {
                    localStorage.removeItem(key);
                    return true;
                } catch {
                    return false;
                }
            }
        };

        // Re-initialize notes after storage is defined
        notes = storage.get('smart-notes', []);

        // ── LOGIC ────────────────────────────────────────────
        function createNote(title, body, tag) {
            return {
                id: Date.now(),
                title: title.trim(),
                body: body.trim(),
                tag: tag.trim().toLowerCase(),
                createdAt: new Date().toISOString(),
            };
        }

        function getFilteredNotes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tag = document.getElementById('tagFilter').value;
            const sortBy = document.getElementById('sortBy').value;

            return [...notes]
                .filter(n =>
                    (!query || n.title.toLowerCase().includes(query) || n.body.toLowerCase().includes(query)) &&
                    (!tag || n.tag === tag)
                )
                .sort((a, b) => {
                    if (sortBy === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
                    if (sortBy === 'alpha') return a.title.localeCompare(b.title);
                    return new Date(b.createdAt) - new Date(a.createdAt); // newest
                });
        }

        function getAllTags() {
            return [...new Set(notes.map(n => n.tag).filter(Boolean))].sort();
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function saveToStorage() {
            storage.set('smart-notes', notes);
        }

        // ── UI ───────────────────────────────────────────────
        function render() {
            renderTagFilter();
            renderNotes();
            document.getElementById('noteCount').textContent =
                `${notes.length} note${notes.length !== 1 ? 's' : ''}`;
        }

        function renderTagFilter() {
            const current = document.getElementById('tagFilter').value;
            const tags = getAllTags();
            document.getElementById('tagFilter').innerHTML =
                `<option value="">All tags</option>` +
                tags.map(t => `<option value="${t}" ${t === current ? 'selected' : ''}>${t}</option>`).join('');
        }

        function renderNotes() {
            const filtered = getFilteredNotes();
            const grid = document.getElementById('notesGrid');

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty">${notes.length === 0 ? 'No notes yet. Create your first one!' : 'No notes match your search.'}</div>`;
                return;
            }

            grid.innerHTML = filtered.map(note => `
      <div class="note-card" data-id="${note.id}">
        <div class="note-title">${escapeHtml(note.title) || '<em style="color:#aaa">Untitled</em>'}</div>
        <div class="note-body">${escapeHtml(note.body)}</div>
        <div class="note-footer">
          <div style="display:flex;flex-direction:column;gap:4px">
            ${note.tag ? `<span class="tag">${escapeHtml(note.tag)}</span>` : ''}
            <span class="note-date">${formatDate(note.createdAt)}</span>
          </div>
          <div class="note-actions">
            <button class="icon-btn" data-action="copy"  data-id="${note.id}" title="Copy">📋</button>
            <button class="icon-btn" data-action="edit"  data-id="${note.id}" title="Edit">✏️</button>
            <button class="icon-btn" data-action="delete" data-id="${note.id}" title="Delete">🗑️</button>
          </div>
        </div>
      </div>
    `).join('');

            // IntersectionObserver — animate cards as they enter viewport
            document.querySelectorAll('.note-card').forEach(card => {
                cardObserver.observe(card);
            });
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function showStatus(message, duration = 2000) {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.classList.add('show');
            setTimeout(() => bar.classList.remove('show'), duration);
        }

        // ── CRUD OPERATIONS ──────────────────────────────────
        function saveNote() {
            const title = document.getElementById('inputTitle').value.trim();
            const body = document.getElementById('inputBody').value.trim();
            const tag = document.getElementById('inputTag').value.trim();

            if (!title && !body) {
                showStatus("Note can't be empty.");
                return;
            }

            if (editingId !== null) {
                // Update existing
                notes = notes.map(n =>
                    n.id === editingId ? { ...n, title, body, tag } : n
                );
                showStatus("Note updated ✓");
            } else {
                // Create new
                notes.unshift(createNote(title, body, tag));
                showStatus("Note saved ✓");
            }

            saveToStorage();
            closeModal();
            render();
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            saveToStorage();
            showStatus("Note deleted");
            render();
        }

        async function copyNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            const text = [note.title, note.body].filter(Boolean).join('\n\n');
            const ok = await navigator.clipboard.writeText(text).then(() => true).catch(() => false);
            showStatus(ok ? "Copied to clipboard ✓" : "Copy failed");
        }

        // ── MODAL ────────────────────────────────────────────
        function openModal(note = null) {
            editingId = note ? note.id : null;
            document.getElementById('modalTitle').textContent = note ? 'Edit Note' : 'New Note';
            document.getElementById('inputTitle').value = note?.title ?? '';
            document.getElementById('inputBody').value = note?.body ?? '';
            document.getElementById('inputTag').value = note?.tag ?? '';
            document.getElementById('modalBackdrop').classList.add('open');
            setTimeout(() => document.getElementById('inputTitle').focus(), 50);
        }

        function closeModal() {
            document.getElementById('modalBackdrop').classList.remove('open');
            editingId = null;
        }

        // ── EVENT DELEGATION ─────────────────────────────────
        document.getElementById('notesGrid').addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;

            const id = parseInt(btn.dataset.id);
            const action = btn.dataset.action;

            if (action === 'delete') deleteNote(id);
            if (action === 'copy') await copyNote(id);
            if (action === 'edit') {
                const note = notes.find(n => n.id === id);
                if (note) openModal(note);
            }
        });

        // Close modal on backdrop click
        document.getElementById('modalBackdrop').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                openModal();
            }
        });

        // ── INTERSECTION OBSERVER — card entrance animation ──
        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    cardObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.05 });

        // ── PAGE VISIBILITY — save draft when tab hidden ─────
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                const draft = {
                    title: document.getElementById('inputTitle').value,
                    body: document.getElementById('inputBody').value,
                    tag: document.getElementById('inputTag').value,
                };
                if (draft.title || draft.body) {
                    storage.set('note-draft', draft);
                }
            }
        });

        // Restore draft if one exists
        const savedDraft = storage.get('note-draft');
        if (savedDraft?.title || savedDraft?.body) {
            openModal();
            document.getElementById('inputTitle').value = savedDraft.title ?? '';
            document.getElementById('inputBody').value = savedDraft.body ?? '';
            document.getElementById('inputTag').value = savedDraft.tag ?? '';
            storage.remove?.('note-draft');
            showStatus("Draft restored ✓");
        }

        // ── ONLINE / OFFLINE ─────────────────────────────────
        window.addEventListener('offline', () => {
            document.getElementById('offlineBanner').classList.add('show');
        });
        window.addEventListener('online', () => {
            document.getElementById('offlineBanner').classList.remove('show');
            showStatus("Back online ✓");
        });

        // ── INIT ─────────────────────────────────────────────
        render();
    </script>
</body>

</html>
