<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f9fafb;
            color: #111;
            min-height: 100vh
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 700
        }

        .header-actions {
            display: flex;
            gap: 8px
        }

        .app {
            max-width: 780px;
            margin: 0 auto;
            padding: 24px 16px
        }

        /* Summary cards */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px
        }

        .summary-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px
        }

        .summary-label {
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .summary-value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 4px
        }

        .summary-sub {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px
        }

        /* Category breakdown */
        .breakdown {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px
        }

        .breakdown-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px
        }

        .cat-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px
        }

        .cat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .cat-name {
            width: 90px;
            color: #374151
        }

        .cat-bar-wrap {
            flex: 1;
            height: 7px;
            background: #f3f4f6;
            border-radius: 4px;
            overflow: hidden
        }

        .cat-bar {
            height: 100%;
            border-radius: 4px;
            transition: width .4s
        }

        .cat-amount {
            width: 70px;
            text-align: right;
            color: #374151;
            font-weight: 500
        }

        .cat-pct {
            width: 36px;
            text-align: right;
            color: #9ca3af;
            font-size: 12px
        }

        /* Form */
        .form-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px
        }

        .form-card h2 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 8px;
            align-items: end
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .field label {
            font-size: 11px;
            color: #6b7280
        }

        .field input,
        .field select {
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            font-size: 14px;
            outline: none;
            font-family: inherit
        }

        .field input:focus,
        .field select:focus {
            border-color: #6366f1
        }

        .btn {
            padding: 8px 16px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500
        }

        .btn-primary {
            background: #6366f1;
            color: #fff
        }

        .btn-primary:hover {
            background: #4f46e5
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 6px;
            cursor: pointer
        }

        .btn-sm:hover {
            background: #f3f4f6
        }

        .btn-danger {
            color: #ef4444;
            border-color: #fca5a5
        }

        .btn-danger:hover {
            background: #fef2f2
        }

        /* List */
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px
        }

        .list-header h2 {
            font-size: 13px;
            font-weight: 600
        }

        .list-controls {
            display: flex;
            gap: 6px
        }

        .list-controls select {
            padding: 5px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 12px
        }

        .expense-list {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .expense-item {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px
        }

        .expense-item:hover {
            border-color: #c7d2fe
        }

        .expense-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0
        }

        .expense-info {
            flex: 1;
            min-width: 0
        }

        .expense-desc {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .expense-meta {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 1px
        }

        .expense-amount {
            font-size: 15px;
            font-weight: 700;
            color: #ef4444;
            flex-shrink: 0
        }

        .expense-amount.income {
            color: #10b981
        }

        .empty {
            text-align: center;
            color: #9ca3af;
            padding: 3rem 0;
            font-size: 14px
        }

        .month-divider {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 0 4px;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 4px
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>💰 Expense Tracker</h1>
        <div class="header-actions">
            <button class="btn-sm" onclick="exportCSV()">Export CSV</button>
            <button class="btn-sm btn-danger" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <div class="app">

        <!-- Summary -->
        <div class="summary">
            <div class="summary-card">
                <div class="summary-label">Total Spent</div>
                <div class="summary-value" id="totalSpent">$0</div>
                <div class="summary-sub" id="totalCount">0 expenses</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">This Month</div>
                <div class="summary-value" id="monthSpent">$0</div>
                <div class="summary-sub" id="monthCount">0 this month</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">Largest Expense</div>
                <div class="summary-value" id="largestAmt">$0</div>
                <div class="summary-sub" id="largestDesc">—</div>
            </div>
        </div>

        <!-- Category breakdown -->
        <div class="breakdown">
            <div class="breakdown-title">Spending by Category</div>
            <div id="breakdown"></div>
        </div>

        <!-- Add form -->
        <div class="form-card">
            <h2>Add Expense</h2>
            <div class="form-row">
                <div class="field">
                    <label>Description</label>
                    <input type="text" id="desc" placeholder="e.g. Lunch at cafe" maxlength="60" />
                </div>
                <div class="field">
                    <label>Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
                </div>
                <div class="field">
                    <label>Category</label>
                    <select id="category">
                        <option value="food">🍔 Food</option>
                        <option value="transport">🚗 Transport</option>
                        <option value="shopping">🛍 Shopping</option>
                        <option value="bills">📋 Bills</option>
                        <option value="health">💊 Health</option>
                        <option value="entertainment">🎮 Entertainment</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="date" />
                </div>
                <button class="btn btn-primary" onclick="addExpense()">Add</button>
            </div>
        </div>

        <!-- Expense list -->
        <div class="list-header">
            <h2>Transactions</h2>
            <div class="list-controls">
                <select id="filterCat" onchange="render()">
                    <option value="">All categories</option>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="shopping">Shopping</option>
                    <option value="bills">Bills</option>
                    <option value="health">Health</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="other">Other</option>
                </select>
                <select id="sortExp" onchange="render()">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="highest">Highest</option>
                    <option value="lowest">Lowest</option>
                </select>
            </div>
        </div>
        <div class="expense-list" id="expenseList"></div>

    </div>

    <script>
        // ── CONFIG ────────────────────────────────────────────
        const CATEGORIES = {
            food: { label: 'Food', icon: '🍔', color: '#f59e0b' },
            transport: { label: 'Transport', icon: '🚗', color: '#3b82f6' },
            shopping: { label: 'Shopping', icon: '🛍', color: '#8b5cf6' },
            bills: { label: 'Bills', icon: '📋', color: '#ef4444' },
            health: { label: 'Health', icon: '💊', color: '#10b981' },
            entertainment: { label: 'Entertainment', icon: '🎮', color: '#f97316' },
            other: { label: 'Other', icon: '📦', color: '#6b7280' },
        };

        // ── STORAGE ───────────────────────────────────────────
        const store = {
            get: (key, fb = null) => {
                try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; }
                catch { return fb; }
            },
            set: (key, val) => {
                try { localStorage.setItem(key, JSON.stringify(val)); } catch { }
            }
        };

        // ── STATE ─────────────────────────────────────────────
        let expenses = store.get('expenses', []);

        // Set today's date as default
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // ── LOGIC ─────────────────────────────────────────────
        function createExpense(desc, amount, category, date) {
            return { id: Date.now(), desc, amount: parseFloat(amount), category, date };
        }

        function getFiltered() {
            const cat = document.getElementById('filterCat').value;
            const sort = document.getElementById('sortExp').value;

            return [...expenses]
                .filter(e => !cat || e.category === cat)
                .sort((a, b) => {
                    if (sort === 'oldest') return new Date(a.date) - new Date(b.date);
                    if (sort === 'highest') return b.amount - a.amount;
                    if (sort === 'lowest') return a.amount - b.amount;
                    return new Date(b.date) - new Date(a.date);
                });
        }

        function computeSummary() {
            const now = new Date();
            const thisMonth = expenses.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const largest = expenses.reduce((max, e) => e.amount > (max?.amount ?? 0) ? e : max, null);
            const total = expenses.reduce((s, e) => s + e.amount, 0);

            return {
                total,
                count: expenses.length,
                monthTotal: thisMonth.reduce((s, e) => s + e.amount, 0),
                monthCount: thisMonth.length,
                largest,
            };
        }

        function computeBreakdown() {
            const totals = expenses.reduce((acc, e) => {
                acc[e.category] = (acc[e.category] ?? 0) + e.amount;
                return acc;
            }, {});
            const max = Math.max(...Object.values(totals), 1);
            return { totals, max };
        }

        function groupByMonth(list) {
            return list.reduce((groups, e) => {
                const key = new Date(e.date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                (groups[key] ??= []).push(e);
                return groups;
            }, {});
        }

        const fmt = (n) => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // ── UI ────────────────────────────────────────────────
        function render() {
            renderSummary();
            renderBreakdown();
            renderList();
        }

        function renderSummary() {
            const s = computeSummary();
            document.getElementById('totalSpent').textContent = fmt(s.total);
            document.getElementById('totalCount').textContent = `${s.count} expense${s.count !== 1 ? 's' : ''}`;
            document.getElementById('monthSpent').textContent = fmt(s.monthTotal);
            document.getElementById('monthCount').textContent = `${s.monthCount} this month`;
            document.getElementById('largestAmt').textContent = s.largest ? fmt(s.largest.amount) : '$0';
            document.getElementById('largestDesc').textContent = s.largest?.desc ?? '—';
        }

        function renderBreakdown() {
            const { totals, max } = computeBreakdown();
            const total = Object.values(totals).reduce((a, b) => a + b, 0) || 1;

            document.getElementById('breakdown').innerHTML =
                Object.entries(CATEGORIES)
                    .filter(([key]) => totals[key])
                    .sort(([, a], [, b]) => (totals[b] ?? 0) - (totals[a] ?? 0))
                    .map(([key, cat]) => {
                        const amt = totals[key] ?? 0;
                        const pct = (amt / total * 100).toFixed(0);
                        const barW = (amt / max * 100).toFixed(1);
                        return `
          <div class="cat-row">
            <div class="cat-dot" style="background:${cat.color}"></div>
            <div class="cat-name">${cat.label}</div>
            <div class="cat-bar-wrap">
              <div class="cat-bar" style="width:${barW}%;background:${cat.color}"></div>
            </div>
            <div class="cat-amount">${fmt(amt)}</div>
            <div class="cat-pct">${pct}%</div>
          </div>`;
                    }).join('') || '<div style="color:#9ca3af;font-size:13px">No data yet.</div>';
        }

        function renderList() {
            const filtered = getFiltered();
            const el = document.getElementById('expenseList');

            if (filtered.length === 0) {
                el.innerHTML = `<div class="empty">No expenses yet.<br>Add your first one above.</div>`;
                return;
            }

            const groups = groupByMonth(filtered);
            el.innerHTML = Object.entries(groups).map(([month, items]) => `
    <div class="month-divider">${month} — ${fmt(items.reduce((s, e) => s + e.amount, 0))}</div>
    ${items.map(e => {
                const cat = CATEGORIES[e.category];
                return `
        <div class="expense-item" data-id="${e.id}">
          <div class="expense-icon" style="background:${cat.color}22">${cat.icon}</div>
          <div class="expense-info">
            <div class="expense-desc">${escHtml(e.desc)}</div>
            <div class="expense-meta">${cat.label} · ${formatDate(e.date)}</div>
          </div>
          <div class="expense-amount">${fmt(e.amount)}</div>
          <button class="btn-sm btn-danger" data-action="delete" data-id="${e.id}">✕</button>
        </div>`;
            }).join('')}
  `).join('');
        }

        // ── ACTIONS ───────────────────────────────────────────
        function addExpense() {
            const desc = document.getElementById('desc').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const cat = document.getElementById('category').value;
            const date = document.getElementById('date').value;

            if (!desc) return flash('desc', 'Enter a description');
            if (!amount || amount <= 0) return flash('amount', 'Enter a valid amount');
            if (!date) return flash('date', 'Pick a date');

            expenses.unshift(createExpense(desc, amount, cat, date));
            store.set('expenses', expenses);

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('desc').focus();
            render();
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            store.set('expenses', expenses);
            render();
        }

        function clearAll() {
            if (!confirm('Delete all expenses? This cannot be undone.')) return;
            expenses = [];
            store.set('expenses', expenses);
            render();
        }

        function exportCSV() {
            const header = 'Date,Description,Category,Amount';
            const rows = expenses.map(e =>
                `${e.date},"${e.desc}",${CATEGORIES[e.category].label},${e.amount.toFixed(2)}`
            );
            const csv = [header, ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = Object.assign(document.createElement('a'), { href: url, download: 'expenses.csv' });
            a.click();
            URL.revokeObjectURL(url);
        }

        // ── HELPERS ───────────────────────────────────────────
        function flash(id, msg) {
            const el = document.getElementById(id);
            el.style.borderColor = '#ef4444';
            el.placeholder = msg;
            el.focus();
            setTimeout(() => {
                el.style.borderColor = '';
                el.placeholder = el.id === 'amount' ? '0.00' : el.placeholder;
            }, 2000);
        }

        function formatDate(iso) {
            return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Event delegation for delete
        document.getElementById('expenseList').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action="delete"]');
            if (btn) deleteExpense(parseInt(btn.dataset.id));
        });

        // Enter to submit
        document.getElementById('amount').addEventListener('keydown', e => {
            if (e.key === 'Enter') addExpense();
        });

        render();
    </script>
</body>

</html>
